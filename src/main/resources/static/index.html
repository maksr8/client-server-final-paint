<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintOnline!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        #canvas-container {
            border: 2px dashed #dee2e6;
            background-color: #f8f9fa;
            cursor: crosshair;
            overflow: auto;
            position: relative;
        }
        canvas {
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .color-picker-wrapper {
            background: #e9ecef;
            border-radius: 4px;
            padding: 2px;
        }
        .brush-size-wrapper {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand" id="nav-brand">PaintOnline!</span>
        <div class="d-flex align-items-center">
            <button id="nav-dashboard" class="btn btn-outline-light btn-sm me-3 d-none">Dashboard</button>
            <span id="user-display" class="text-light me-3 d-none"></span>
            <button id="logout-btn" class="btn btn-outline-light btn-sm d-none">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div id="auth-view" class="row justify-content-center d-none">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Welcome</h3>
                    <div id="auth-error" class="alert alert-danger d-none"></div>
                    <form id="auth-form">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" maxlength="255" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" maxlength="255" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" id="btn-login">Login</button>
                            <button type="submit" class="btn btn-outline-secondary" id="btn-register">Register</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-view" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Dashboard</h2>
            <form class="d-flex" id="create-drawing-form">
                <input type="text" id="new-drawing-name" class="form-control me-2" placeholder="New drawing name..." maxlength="255" required>
                <button type="submit" class="btn btn-success">Create</button>
            </form>
        </div>
        
        <h4 class="mt-4">My drawings</h4>
        <div class="row" id="drawings-list-owned"></div>

        <h4 class="mt-4">Drawings shared to me</h4>
        <div class="row" id="drawings-list-shared"></div>
    </div>

    <div id="paint-view" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3 p-2 bg-white rounded shadow-sm border">

            <h5 id="current-drawing-title" class="mb-0 text-muted ps-2">Drawing...</h5>

            <div class="d-flex align-items-center gap-3">

                <div class="d-flex align-items-center gap-2 color-picker-wrapper" title="Brush Color">
                    <i class="bi bi-palette text-secondary"></i>
                    <input type="color" id="color-picker" value="#000000" class="form-control form-control-color border-0 p-0" style="width: 32px; height: 32px; cursor: pointer;">
                </div>

                <div class="vr"></div> 
                
                <div class="d-flex align-items-center gap-2 brush-size-wrapper" title="Brush Size">
                    <i class="bi bi-brush text-secondary"></i>
                    <input type="range" id="brush-size" min="1" max="20" value="3" class="form-range" style="width: 100px;">
                </div>

                <div class="vr"></div>
                <button class="btn btn-outline-secondary btn-sm" id="btn-undo" title="Undo (Ctrl+Z)">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>

                <button class="btn btn-success btn-sm" id="btn-export">
                    <i class="bi bi-download"></i> Export
                </button>
                <button class="btn btn-outline-danger btn-sm" id="btn-exit">
                    <i class="bi bi-box-arrow-right"></i> Exit
                </button>
            </div>
        </div>

        <div id="canvas-container" class="p-3 border rounded bg-light text-center">
            <canvas id="board" width="800" height="600" class="bg-white shadow-sm"></canvas>
        </div>
    </div>
</div>

<div class="modal fade" id="renameModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Rename Drawing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rename-drawing-id">
        <input type="text" id="rename-input" class="form-control" placeholder="New name..." maxlength="255">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="btn-save-rename">Save changes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
